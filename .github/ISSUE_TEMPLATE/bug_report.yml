name: Bug Report
description: Report a problem with Vesta
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue.

  - type: input
    id: vesta_version
    attributes:
      label: Vesta Version
      description: Found in Settings → Integrations → Vesta → (three dots) → Integration info
      placeholder: "e.g. 1.2.1"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      description: Found in Settings → About
      placeholder: "e.g. 2024.12.0"
    validations:
      required: true

  - type: dropdown
    id: heater_type
    attributes:
      label: Heater Type
      description: What kind of heater entity are you using?
      multiple: true
      options:
        - Climate / TRV
        - Switch
        - Water heater
        - Mixed
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Set preset to ...
        2. Wait for ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: |
        Enable debug logging for Vesta by adding this to your `configuration.yaml`, then reproduce the issue and paste the logs here.
        ```yaml
        logger:
          logs:
            custom_components.vesta: debug
        ```
      render: text

  - type: textarea
    id: config
    attributes:
      label: Room/Global configuration (optional)
      description: Paste any relevant config details (anonymise entity IDs if needed).
      render: yaml
