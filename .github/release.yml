changelog:
  exclude:
    authors:
      - "github-actions[bot]"
  categories:
    - title: "🚀 New Features"
      labels:
        - "enhancement"
        - "feature"
    - title: "🐛 Bug Fixes"
      labels:
        - "bug"
        - "fix"
    - title: "📖 Documentation"
      labels:
        - "documentation"
    - title: "🔧 Improvements"
      labels:
        - "refactor"
        - "improvement"
    - title: "⬆️ Dependencies"
      labels:
        - "dependencies"
    - title: "🔩 Other Changes"
      labels:
        - "*"
