name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update manifest version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v' \
              custom_components/vesta/manifest.json > tmp.json \
            && mv tmp.json custom_components/vesta/manifest.json

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add custom_components/vesta/manifest.json
          git diff --cached --quiet || git commit -m "chore: bump version to ${GITHUB_REF_NAME#v}"
          git push origin HEAD:main || true

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate release notes
        run: git-cliff --config cliff.toml --latest --strip header -o RELEASE_NOTES.md

      - name: Create integration zip
        run: |
          cd custom_components
          zip -r ../vesta.zip vesta/
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: vesta.zip
