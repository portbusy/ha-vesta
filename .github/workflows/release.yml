name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: ZIP the integration directory
        run: |
          cd custom_components/vesta
          zip vesta.zip -r ./
          mv vesta.zip ../../
      - name: Upload zip to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: vesta.zip
          asset_name: vesta.zip
          tag: ${{ github.ref }}
          overwrite: true
